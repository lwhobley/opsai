services:
  - type: web
    name: opsai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT --workers 2
    plan: starter
    region: ohio
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: COOKIE_SECURE
        value: true
      - key: FRONTEND_URL
        sync: false
      - key: TARGET_POUR_COST_PCT
        value: "20.0"
      - key: TARGET_FOOD_COST_PCT
        value: "30.0"
      - key: PYTHON_VERSION
        value: "3.11.0"

  - type: static_site
    name: opsai-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false
